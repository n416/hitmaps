<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>HIT2 Map Viewer (3D/2D)</title>
    <link rel="stylesheet" href="map_viewer.css?v=1.0.1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<!-- 邪魔にならない下部ツールバー -->
<div id="bottom-bar">
    <button id="btn-topdown" class="btn" title="2D俯瞰">2D</button>
    <button id="btn-birdseye" class="btn" title="3D鳥瞰">鳥瞰</button>
    <button id="btn-human" class="btn active" title="3D人間目線">人間目線</button>
    <div class="divider"></div>
    <button id="btn-reset" class="btn btn-icon" title="リセット">↺</button>
    <div class="divider"></div>
    <button id="btn-share" class="btn btn-icon" title="共有URLコピー">🔗</button>
</div>

<!-- ツール切り替えバー -->
<div id="tool-bar">
    <button id="tool-move" class="btn tool-btn active" title="カメラ移動">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0v4"/><path d="M14 10V5a2 2 0 0 0-4 0v5"/><path d="M10 10.5V4a2 2 0 0 0-4 0v9"/><path d="M6 13V8a2 2 0 0 0-4 0v11.5c0 4.1 3.4 7.5 7.5 7.5h.5c5 0 9-4 9-9V11.5a2 2 0 0 0-4 0V14"/></svg>
    </button>
    <button id="tool-pin" class="btn tool-btn" title="ピン追加">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    </button>
    <button id="tool-arrow" class="btn tool-btn" title="矢印追加">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21S7 5 21 5"/><path d="M15 11l6-6-6-6"/></svg>
    </button>
    <div class="divider" style="width: 24px; height: 1px; margin: 4px auto; background: rgba(255,255,255,0.1);"></div>
    <button id="tool-clear" class="btn tool-btn" title="すべて消去">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
</div>

<!-- 3D表示用のコンテナ -->
<div id="scene">
    <div id="camera">
        <div id="map-container">
            <img src="maps/seibutu.png" id="map-image" alt="Map PVP3 HS Battle">
            
            <!-- 矢印描画用SVGレイヤー -->
            <svg id="arrow-layer" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <marker id="arrowhead_0" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
                        <polygon points="0 0, 12 4, 0 8" fill="rgba(0, 210, 255, 0.9)" />
                    </marker>
                    <marker id="arrowhead_1" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
                        <polygon points="0 0, 12 4, 0 8" fill="rgba(255, 50, 50, 0.9)" />
                    </marker>
                    <marker id="arrowhead_2" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
                        <polygon points="0 0, 12 4, 0 8" fill="rgba(50, 255, 50, 0.9)" />
                    </marker>
                    <marker id="arrowhead_3" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
                        <polygon points="0 0, 12 4, 0 8" fill="rgba(255, 230, 0, 0.9)" />
                    </marker>
                    <marker id="arrowhead_4" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
                        <polygon points="0 0, 12 4, 0 8" fill="rgba(255, 255, 255, 0.9)" />
                    </marker>
                </defs>
            </svg>
            
            <!-- マーカーはJSで動的に追加されます -->
        </div>
    </div>
</div>

<!-- ピン編集モーダル -->
<div id="pin-modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modal-title">ピンの編集</h3>
        <input type="text" id="pin-text" placeholder="拠点名などを入力..." autocomplete="off">
        <div class="modal-buttons">
            <button id="btn-pin-save" class="btn modal-btn primary">保存</button>
            <button id="btn-pin-delete" class="btn modal-btn danger">削除</button>
            <button id="btn-pin-cancel" class="btn modal-btn">キャンセル</button>
        </div>
    </div>
</div>

<!-- トースト通知 -->
<div id="toast" class="toast hidden">コピーしました</div>

<script src="map_viewer.js?v=1.0.1"></script>
</body>

</html>
